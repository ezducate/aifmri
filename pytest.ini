[pytest]
testpaths = tests
addopts = -q --strict-markers -m "not slow and not ui"
addopts_note = ui tests need playwright + chromium
markers =
    slow: needs real HuggingFace models (hundreds of MB). Run with: pytest -m slow
    ui: real-browser layout/reachability checks. Run with: pytest -m ui
filterwarnings =
    ignore::RuntimeWarning
